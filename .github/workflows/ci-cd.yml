name: Quizzie CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1: Backend tests
  # ─────────────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: quizzie_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system deps (OpenCV / audio)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libsndfile1 ffmpeg libgl1 libglib2.0-0

      - name: Install Python dependencies
        working-directory: backend
        run: pip install --no-cache-dir -r requirements.txt

      - name: Run pytest with coverage
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres123@localhost:5432/quizzie_test
          REDIS_URL: redis://localhost:6379/1
          SECRET_KEY: test-secret-key-ci-only
          ENVIRONMENT: test
        run: |
          pytest tests/ \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: Frontend lint + build
  # ─────────────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend Build (Node)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint || true   # warn only — don't block deploy on lint

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit || true

      - name: Production build
        working-directory: frontend
        env:
          VITE_API_URL: https://quizzie-api.onrender.com
        run: npm run build

  # ─────────────────────────────────────────────────────────────────
  # JOB 3: Deploy — only on push to main after both tests pass
  # ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy Backend to Render
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}" \
            | grep -q "^2" && echo "Backend deploy triggered" || echo "Backend deploy failed"

      - name: Deploy Frontend to Render
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}" \
            | grep -q "^2" && echo "Frontend deploy triggered" || echo "Frontend deploy failed"

      - name: Notify success
        run: echo "Quizzie deployed from commit ${{ github.sha }}"
