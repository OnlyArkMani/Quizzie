version: '3.9'

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: quizzie_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_DB:       ${POSTGRES_DB:-quizzie_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Not exposed to host in production — only backend can reach it
    # expose: ["5432"]

  # ─── Backend (FastAPI) ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quizzie_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      # Overrides .env so it uses the Docker service name, not localhost
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/${POSTGRES_DB:-quizzie_db}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"    # expose for direct API access / testing; remove in prod if frontend proxies

  # ─── Frontend (React → nginx) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quizzie_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      BACKEND_URL: "http://backend:8000"
    depends_on:
      - backend

volumes:
  postgres_data:
