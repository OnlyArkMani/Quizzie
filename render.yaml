# render.yaml — Quizzie full production deployment
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Backend API (FastAPI) ────────────────────────────────────────────────
  - type: web
    name: quizzie-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: standard           # 2 GB RAM, 1 vCPU — handles 500+ concurrent students
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quizzie-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: quizzie-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: WORKERS
        value: "5"           # (2 × 2 vCPU cores) + 1
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "120"
      - key: CORS_ORIGINS
        value: "https://quizzie.onrender.com"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: FRONTEND_URL
        value: "https://quizzie.onrender.com"
    autoDeploy: true

  # ── Celery Worker: Proctoring (AI frame/audio analysis) ─────────────────
  - type: worker
    name: quizzie-celery-proctoring
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: standard           # Needs CPU for MediaPipe — keep separate from API
    startCommand: celery -A app.worker.celery_app worker -Q proctoring --concurrency=4 --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quizzie-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: quizzie-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        fromService:
          name: quizzie-api
          type: web
          envVarKey: SECRET_KEY
    autoDeploy: true

  # ── Celery Worker: Evaluation (score calculation) ────────────────────────
  - type: worker
    name: quizzie-celery-evaluation
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    startCommand: celery -A app.worker.celery_app worker -Q evaluation --concurrency=2 --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quizzie-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: quizzie-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        fromService:
          name: quizzie-api
          type: web
          envVarKey: SECRET_KEY
    autoDeploy: true

  # ── Frontend (React → Nginx static) ─────────────────────────────────────
  - type: web
    name: quizzie
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: starter
    envVars:
      - key: BACKEND_URL
        fromService:
          name: quizzie-api
          type: web
          property: host
    autoDeploy: true

  # ── Redis (Celery broker + cache) ────────────────────────────────────────
  - type: redis
    name: quizzie-redis
    plan: starter            # 25 MB — more than enough for Celery queue + cache
    maxmemoryPolicy: allkeys-lru

databases:
  # ── PostgreSQL ───────────────────────────────────────────────────────────
  - name: quizzie-postgres
    databaseName: quizzie_db
    plan: standard           # 4 GB RAM, 256 connections — production grade
